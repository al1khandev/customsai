services:
  customsai:
    build: .
    container_name: customsai
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      DATA_DIR: /data
      AUTH_DIR: /data/whatsapp-auth
      DECLARATIONS_DIR: /data/declarations
      SETTINGS_FILE: /data/settings.json
      KEDEN_TNVED_URL: https://keden.kz/tnved
      WHATSAPP_RECONNECT_DELAY_MS: 15000
      WATCHDOG_INTERVAL_MS: 60000
      WATCHDOG_MAX_DISCONNECTED_MS: 600000
    volumes:
      - customsai_data:/data

volumes:
  customsai_data:
